{% extends "auth_index.html" %}
{% load static %}

{% block content %}
<div class="auth-form-header">
  <h1>Welcome to KeepReading</h1>
  <p>Sign in to your KeepReading account to continue managing your library.</p>
</div>

<form id="formAuthentication" method="POST">
  {% csrf_token %}

  <div class="form-group">
    <label for="email">Username</label>
    <input
      type="text"
      class="form-control"
      id="email"
      name="email-username"
      placeholder="Enter your username"
      autofocus
      required
    />
  </div>


 <!--<div class="form-group">-->
 <!--   <label for="TEST">TEST</label>-->
 <!--   <input-->
 <!--     type="text"-->
 <!--     class="form-control"-->
 <!--     id="TEST"-->
 <!--     name="TEST-username"-->
 <!--     placeholder="Enter your TEST username"-->
 <!--     autofocus-->
 <!--   />-->
 <!-- </div>-->
  <div class="form-group">
    <label for="password">Password</label>
    <div class="password-group">
      <input
        type="password"
        id="password"
        class="form-control"
        name="password"
        placeholder="Enter your password"
        aria-describedby="password"
        required
      />
      <button type="button" class="password-toggle">
        <i class="bx bx-hide"></i>
      </button>
    </div>
  </div>

  <button class="btn-auth" type="submit">Sign In</button>
</form>

{% if error %}
<div class="error-msg">
  <i class="bx bx-error-circle" style="margin-right:6px;"></i>{{ error }}
</div>
{% endif %}

<div class="auth-redirect" style="margin-top:24px;">
  <span>Don't have an account? </span>
  <a href="{% url 'register_page' %}">Create one </a>
</div>
{% endblock %}
