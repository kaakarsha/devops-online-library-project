{% load static %}
<!DOCTYPE html>
<html lang="en" class="light-style customizer-hide" dir="ltr" data-theme="theme-default" data-assets-path="{% static 'assets/' %}" data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>KeepReading — Library Management</title>
    <meta name="description" content="" />
    <link rel="icon" type="image/x-icon" href="{% static 'assets/img/favicon/favicon.ico' %}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'assets/vendor/fonts/boxicons.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/vendor/css/core.css' %}" class="template-customizer-core-css" />
    <link rel="stylesheet" href="{% static 'assets/vendor/css/theme-default.css' %}" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="{% static 'assets/css/demo.css' %}" />
    <link rel="stylesheet" href="{% static 'assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css' %}" />
    <script src="{% static 'assets/vendor/js/helpers.js' %}"></script>
    <script src="{% static 'assets/js/config.js' %}"></script>

    <style>
      :root {
        --cream: #faf8f5;
        --sand: #e8dfd0;
        --sand-dark: #d4c9b8;
        --brown: #5c4a32;
        --brown-dark: #3d3020;
        --accent: #2d6a4f;
        --accent-light: #52b788;
        --accent-pale: #d8f3dc;
        --border: #e8e0d4;
        --text-primary: #2c2416;
        --text-secondary: #7a6a54;
        --text-muted: #a89880;
        --danger: #c0392b;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--cream);
        min-height: 100vh;
        display: flex;
      }

      /* Left panel — decorative */
      .auth-panel-left {
        display: none;
        width: 50%;
        background: linear-gradient(160deg, #1a3d2b 0%, #2d6a4f 45%, #52b788 100%);
        position: relative;
        overflow: hidden;
        padding: 60px 56px;
        flex-direction: column;
        justify-content: space-between;
      }

      @media (min-width: 900px) { .auth-panel-left { display: flex; } }

      .auth-panel-left::before {
        content: '';
        position: absolute;
        top: -120px; right: -120px;
        width: 400px; height: 400px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
      }

      .auth-panel-left::after {
        content: '';
        position: absolute;
        bottom: -80px; left: -80px;
        width: 300px; height: 300px;
        border-radius: 50%;
        background: rgba(255,255,255,0.04);
      }

      .auth-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        z-index: 1;
      }

      .auth-brand-icon {
        width: 44px;
        height: 44px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 22px;
      }

      .auth-brand-name {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        font-weight: 700;
        color: white;
        letter-spacing: -0.3px;
      }

      .auth-tagline {
        position: relative;
        z-index: 1;
      }

      .auth-tagline h2 {
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        font-weight: 700;
        color: white;
        line-height: 1.25;
        margin-bottom: 16px;
      }

      .auth-tagline p {
        font-size: 15px;
        color: rgba(255,255,255,0.75);
        line-height: 1.6;
        max-width: 380px;
      }

      .auth-stats {
        display: flex;
        gap: 32px;
        position: relative;
        z-index: 1;
      }

      .auth-stat-item { color: white; }
      .auth-stat-num {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 700;
        display: block;
        line-height: 1;
        margin-bottom: 4px;
      }

      .auth-stat-label {
        font-size: 12px;
        color: rgba(255,255,255,0.65);
        font-weight: 500;
        letter-spacing: 0.3px;
      }

      /* Right panel — form */
      .auth-panel-right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 24px;
        background: var(--cream);
      }

      .auth-form-wrapper {
        width: 100%;
        max-width: 420px;
      }

      .auth-form-header {
        margin-bottom: 32px;
      }

      .auth-form-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--brown-dark);
        margin-bottom: 8px;
      }

      .auth-form-header p {
        font-size: 14px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      .form-group { margin-bottom: 20px; }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 7px;
      }

      .form-control {
        width: 100%;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 14px;
        font-family: 'DM Sans', sans-serif;
        color: var(--text-primary);
        background: white;
        transition: border-color 0.15s, box-shadow 0.15s;
      }

      .form-control:focus {
        border-color: var(--accent-light);
        box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
        outline: none;
      }

      .form-control::placeholder { color: var(--text-muted); }

      .password-group { position: relative; }

      .password-group .form-control { padding-right: 44px; }

      .password-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 18px;
        padding: 0;
        transition: color 0.15s;
      }

      .password-toggle:hover { color: var(--brown); }

      .btn-auth {
        width: 100%;
        padding: 12px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: all 0.15s;
        margin-top: 8px;
        box-shadow: 0 4px 14px rgba(45,106,79,0.25);
      }

      .btn-auth:hover {
        background: #245e43;
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(45,106,79,0.3);
      }

      .auth-divider {
        text-align: center;
        margin: 24px 0;
        position: relative;
      }

      .auth-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--border);
      }

      .auth-divider span {
        background: var(--cream);
        padding: 0 12px;
        font-size: 12px;
        color: var(--text-muted);
        position: relative;
        font-weight: 500;
      }

      .auth-redirect {
        text-align: center;
        font-size: 14px;
        color: var(--text-secondary);
        margin-top: 20px;
      }

      .auth-redirect a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        transition: color 0.15s;
      }

      .auth-redirect a:hover { color: var(--brown-dark); text-decoration: underline; }

      .error-msg {
        text-align: center;
        font-size: 13px;
        color: var(--danger);
        margin-top: 12px;
        padding: 10px 14px;
        background: #fde8e6;
        border-radius: 8px;
        border: 1px solid #f5c6c3;
      }

      .check-group {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 20px;
      }

      .check-group input[type="checkbox"] {
        width: 17px;
        height: 17px;
        border: 2px solid var(--border);
        border-radius: 5px;
        cursor: pointer;
        flex-shrink: 0;
        margin-top: 1px;
        accent-color: var(--accent);
      }

      .check-group label {
        font-size: 13px;
        font-weight: 400;
        color: var(--text-secondary);
        margin: 0;
        cursor: pointer;
        line-height: 1.4;
      }

      .check-group label a {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      .input-group { position: relative; }
      .input-group .form-control { width: 100%; }
    </style>
  </head>

  <body>
    <div class="auth-panel-left">
      <div class="auth-brand">
        <div class="auth-brand-icon"><i class="bx bx-book-open"></i></div>
        <span class="auth-brand-name">KeepReading</span>
      </div>
      <div class="auth-tagline">
        <h2>Your Digital Library, Simplified.</h2>
        <p>Manage book requests, track availability, and stay on top of your reading journey — all in one elegant platform.</p>
      </div>
      
    </div>

    <div class="auth-panel-right">
      <div class="auth-form-wrapper">
        {% block content %}{% endblock %}
      </div>
    </div>

    <script src="{% static 'assets/vendor/libs/jquery/jquery.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/popper/popper.js' %}"></script>
    <script src="{% static 'assets/vendor/js/bootstrap.js' %}"></script>
    <script src="{% static 'assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js' %}"></script>
    <script src="{% static 'assets/vendor/js/menu.js' %}"></script>
    <script src="{% static 'assets/js/main.js' %}"></script>
    <script async defer src="https://buttons.github.io/buttons.js"></script>
    <script>
      document.querySelectorAll('.password-toggle').forEach(btn => {
        btn.addEventListener('click', function() {
          const input = this.previousElementSibling || this.parentElement.querySelector('input');
          if (input.type === 'password') {
            input.type = 'text';
            this.innerHTML = '<i class="bx bx-show"></i>';
          } else {
            input.type = 'password';
            this.innerHTML = '<i class="bx bx-hide"></i>';
          }
        });
      });
    </script>
  </body>
</html>
